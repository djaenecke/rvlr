<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>RVLR</title>
</head>
<body>
  <!-- Setup Screen -->
  <div id="setup">
    <h1>RVLR</h1>

    <div class="setup-section">
      <label>Select Images</label>
      <input type="file" id="file-input" accept="image/*" multiple>
      <label for="file-input" class="file-label">Choose from Gallery</label>
      <div id="file-count"></div>
    </div>

    <div class="setup-section">
      <label>Or Add Image URLs</label>
      <div class="url-input-row">
        <input type="url" id="url-input" placeholder="https://...">
        <button id="btn-add-url">Add</button>
      </div>
      <div id="url-list"></div>
    </div>

    <div class="setup-section">
      <label>Tile Size</label>
      <div class="tile-size-options">
        <button class="tile-size" data-size="60">Small</button>
        <button class="tile-size active" data-size="80">Medium</button>
        <button class="tile-size" data-size="120">Large</button>
      </div>
    </div>

    <button id="btn-start" disabled>Start Game</button>

    <button id="btn-install" class="hidden">Add to Home Screen</button>
    <button id="btn-refresh">Refresh App</button>
  </div>

  <!-- Game Screen -->
  <div id="app" class="hidden">
    <canvas id="game"></canvas>
    <div id="controls">
      <button id="btn-next">Next</button>
      <button id="btn-clear">Reveal</button>
      <button id="btn-back">New Game</button>
    </div>
    <div id="counter"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
